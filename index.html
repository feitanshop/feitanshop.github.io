<!DOCTYPE html>
<html>
<head>
  <title>Hesap Katalog</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1120;
      color: white;
    }

    .topbar {
      padding: 15px;
      background: #111827;
      display: flex;
      gap: 10px;
    }

    select {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #374151;
    }

    .price {
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="topbar">
  <select id="game" onchange="updateServers(); render();">
    <option value="genshin">Genshin Impact</option>
    <option value="wuthering">Wuthering Waves</option>
    <option value="honkai">Honkai Star Rail</option>
    <option value="zenless">Zenless Zone Zero</option>
  </select>

  <select id="server" onchange="render()"></select>
</div>

<div class="grid" id="list"></div>

<!-- 🔥 FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC2v9hfzTNyEBn3-TCIdGjvbwIV5Xb94tU",
    authDomain: "proje-46934.firebaseapp.com",
    projectId: "proje-46934",
    storageBucket: "proje-46934.firebasestorage.app",
    messagingSenderId: "59395699683",
    appId: "1:59395699683:web:168e5cc9b0339010d2a6d6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.collection = collection;
  window.getDocs = getDocs;
</script>

<script>

// SUNUCULAR
function updateServers() {
  let game = document.getElementById("game").value;
  let serverSelect = document.getElementById("server");

  serverSelect.innerHTML = '<option value="all">Tüm Sunucular</option>';

  let servers = [];

  if (game === "wuthering") {
    servers = ["eu","na","asia","sea","hmt"];
  } else {
    servers = ["eu","na","asia"];
  }

  servers.forEach(s => {
    serverSelect.innerHTML += `<option value="${s}">${s.toUpperCase()}</option>`;
  });
}

// 🔥 FIREBASE RENDER
async function render() {

  if (!window.db) {
    setTimeout(render, 500);
    return;
  }

  let game = document.getElementById("game").value;
  let server = document.getElementById("server").value;

  let list = document.getElementById("list");
  list.innerHTML = "";

  let querySnapshot = await getDocs(collection(db, "accounts"));

  let data = [];

  querySnapshot.forEach(doc => {
    data.push(doc.data());
  });

  let filtered = data.filter(acc => {
    return acc.game === game && (server === "all" || acc.server === server);
  });

  if(filtered.length === 0){
    list.innerHTML = "<p>Hesap bulunamadı</p>";
    return;
  }

  filtered.forEach(acc => {
    list.innerHTML += `
      <div class="card">
        <h3>${acc.game.toUpperCase()}</h3>
        <p>Server: ${acc.server.toUpperCase()}</p>
        <p>Level: ${acc.level}</p>
        <p class="price">${acc.price}$</p>
      </div>
    `;
  });
}

// BAŞLAT
updateServers();
render();

</script>

</body>
</html>
