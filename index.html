<!DOCTYPE html>
<html>
<head>
  <title>Hesap Katalog</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .price {
      color: #22c55e;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

<h1>🔥 Hesap Katalog</h1>

<div class="container">

  <div class="card">
    <h3>Genshin Hesap #1</h3>
    <p>Level: 50</p>
    <p class="price">20$</p>
    <a class="btn" href="#">Satın Al</a>
  </div>

  <div class="card">
    <h3>Genshin Hesap #2</h3>
    <p>Level: 60</p>
    <p class="price">35$</p>
    <a class="btn" href="#">Satın Al</a>
  </div>

</div>

</body>
</html>
