<!DOCTYPE html>
<html>
<head>
  <title>Hesap Katalog</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1120;
      color: white;
    }

    .layout {
      display: flex;
    }

    /* SOL PANEL */
    .sidebar {
      width: 250px;
      background: #111827;
      padding: 20px;
      height: 100vh;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: purple;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    /* SAĞ TARAF */
    .content {
      flex: 1;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #374151;
    }

    .price {
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="layout">

  <!-- SOL PANEL -->
  <div class="sidebar">
    <h2>Filtre</h2>

    <input type="number" id="maxPrice" placeholder="Max fiyat">
    <input type="number" id="minLevel" placeholder="Min level">

    <button onclick="filter()">Filtrele</button>
  </div>

  <!-- SAĞ -->
  <div class="content">
    <h1>🔥 Hesaplar</h1>

    <div class="grid" id="list">

      <div class="card" data-price="20" data-level="50">
        <h3>Hesap #1</h3>
        <p>Level: 50</p>
        <p class="price">20$</p>
      </div>

      <div class="card" data-price="35" data-level="60">
        <h3>Hesap #2</h3>
        <p>Level: 60</p>
        <p class="price">35$</p>
      </div>

      <div class="card" data-price="15" data-level="40">
        <h3>Hesap #3</h3>
        <p>Level: 40</p>
        <p class="price">15$</p>
      </div>

    </div>
  </div>

</div>

<script>
function filter() {
  let maxPrice = document.getElementById("maxPrice").value;
  let minLevel = document.getElementById("minLevel").value;

  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let price = card.getAttribute("data-price");
    let level = card.getAttribute("data-level");

    let show = true;

    if (maxPrice && price > maxPrice) show = false;
    if (minLevel && level < minLevel) show = false;

    card.style.display = show ? "block" : "none";
  });
}
</script>

</body>
</html>
