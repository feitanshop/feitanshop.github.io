<!DOCTYPE html>
<html>
<head>
  <title>Hesap Katalog</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1120;
      color: white;
    }

    .topbar {
      padding: 15px;
      background: #111827;
      display: flex;
      gap: 10px;
    }

    select {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #374151;
    }

    .price {
      color: #22c55e;
    }
  </style>
</head>

<body>

<!-- ÜST SEÇİM -->
<div class="topbar">
  <select id="game" onchange="render()">
    <option value="genshin">Genshin Impact</option>
    <option value="wuthering">Wuthering Waves</option>
  </select>

  <select id="server" onchange="render()">
    <option value="all">Tüm Sunucular</option>
    <option value="eu">Europe</option>
    <option value="na">America</option>
    <option value="asia">Asia</option>
  </select>
</div>

<!-- LİSTE -->
<div class="grid" id="list"></div>

<script>

// TÜM DATA BURADA 🔥
const accounts = [
  {game:"genshin", server:"eu", level:50, price:20},
  {game:"genshin", server:"na", level:60, price:35},
  {game:"genshin", server:"asia", level:45, price:18},

  {game:"wuthering", server:"eu", level:30, price:15},
  {game:"wuthering", server:"na", level:40, price:22},
  {game:"wuthering", server:"asia", level:35, price:19},
];

// RENDER
function render() {
  let game = document.getElementById("game").value;
  let server = document.getElementById("server").value;

  let list = document.getElementById("list");
  list.innerHTML = "";

  let filtered = accounts.filter(acc => {
    return acc.game === game && (server === "all" || acc.server === server);
  });

  filtered.forEach(acc => {
    list.innerHTML += `
      <div class="card">
        <h3>${acc.game.toUpperCase()}</h3>
        <p>Server: ${acc.server}</p>
        <p>Level: ${acc.level}</p>
        <p class="price">${acc.price}$</p>
      </div>
    `;
  });
}

// SAYFA AÇILINCA
render();

</script>

</body>
</html>
